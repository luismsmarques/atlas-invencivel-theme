---
# Atlas Invencível Theme — cPanel Git Version Control deploy config
# Corre quando carregas "Deploy HEAD Commit" no cPanel (Git Version Control).
# Copia o tema do clone Git para a pasta do tema em produção.

deployment:
  tasks:
    # 1) Caminho do tema em produção — AJUSTA se o teu utilizador/pasta for diferente.
    - export DEPLOYPATH=/home/atlasinv/public_html/wp-content/themes/AtlasTheme/
    - export BACKUPDIR="${DEPLOYPATH}../AtlasTheme-backup-$(date +%Y%m%d-%H%M%S)"

    # 2) Garantir que a pasta do tema existe.
    - /bin/mkdir -p "$DEPLOYPATH"

    # 3) Backup do tema atual antes de copiar.
    - /bin/mkdir -p "$BACKUPDIR"
    - /bin/cp -R "$DEPLOYPATH". "$BACKUPDIR"/ 2>/dev/null || true

    # 4) Sincronizar TODO o tema do repositório para produção (overlay, sem apagar).
    #    Exclui ficheiros de desenvolvimento / VCS / nível-de-site.
    - /usr/bin/rsync -a --exclude='.git' --exclude='.github' --exclude='.gitignore' --exclude='.gitattributes' --exclude='.cpanel.yml' --exclude='dev-tools' --exclude='node_modules' --exclude='*.sh' --exclude='.htaccess' --exclude='.htaccess-cache-busting' ./ "$DEPLOYPATH"

    # 5) Permissões corretas.
    - /bin/find "$DEPLOYPATH" -type d -exec /bin/chmod 755 {} \;
    - /bin/find "$DEPLOYPATH" -type f -exec /bin/chmod 644 {} \;

    # 6) Log do deploy.
    - echo "Atlas Theme deployed successfully at $(date)" >> "${DEPLOYPATH}../deploy.log"
